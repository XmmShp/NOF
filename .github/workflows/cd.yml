name: CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  SOLUTION_FILE: NOF.slnx

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI workload
      if: runner.os == 'Windows'
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Verify code formatting
      if: runner.os == 'Linux'
      run: dotnet format --verify-no-changes --verbosity diagnostic

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

  pack-and-publish:
    runs-on: windows-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -match "^refs/tags/v.*") {
          # Tag push - use tag version
          $VERSION = "${{ github.ref_name }}" -replace "^v", ""
          $IS_RELEASE = "true"
        } elseif ("${{ github.event.inputs.version }}" -ne "") {
          # Manual trigger with version input
          $VERSION = "${{ github.event.inputs.version }}"
          $IS_RELEASE = "true"
        } else {
          # Main branch push - use version from Directory.Build.props with nightly suffix
          $CONTENT = Get-Content "Directory.Build.props" -Raw
          if ($CONTENT -match '<VersionPrefix>([^<]+)</VersionPrefix>') {
            $BASE_VERSION = $matches[1]
          } else {
            $BASE_VERSION = "8.0.0"
          }
          $SHORT_SHA = git rev-parse --short HEAD
          $BASE_TIME = [DateTimeOffset]::Parse("2024-01-01T00:00:00Z").ToUnixTimeSeconds()
          $CURRENT_TIME = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $MINUTES_SINCE = [math]::Floor(($CURRENT_TIME - $BASE_TIME) / 60)
          $VERSION = "${BASE_VERSION}-nightly.${MINUTES_SINCE}.${SHORT_SHA}"
          $IS_RELEASE = "false"
        }
        echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
        echo "IS_RELEASE=$IS_RELEASE" >> $env:GITHUB_OUTPUT
        echo "Version: $VERSION"
        echo "Is Release: $IS_RELEASE"

    - name: Pack NuGet packages
      shell: pwsh
      run: |
        $VERSION = "${{ steps.version.outputs.VERSION }}"
        New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null

        $projectFiles = Get-ChildItem src -Recurse -Filter *.csproj | Sort-Object FullName
        $packProjects = @()

        foreach ($project in $projectFiles)
        {
          [xml]$xml = Get-Content $project.FullName -Raw
          $propertyGroups = @($xml.Project.PropertyGroup)
          $packageId = ($propertyGroups | ForEach-Object { $_.PackageId } | Where-Object { $_ } | Select-Object -First 1)
          $isPackable = ($propertyGroups | ForEach-Object { $_.IsPackable } | Where-Object { $_ } | Select-Object -First 1)

          if ([string]::IsNullOrWhiteSpace($packageId))
          {
            continue
          }

          if ($isPackable -and $isPackable.ToString().Trim().ToLowerInvariant() -eq "false")
          {
            continue
          }

          $packProjects += $project.FullName
        }

        if ($packProjects.Count -eq 0)
        {
          throw "No packable projects found under src/."
        }

        foreach ($projectPath in $packProjects)
        {
          Write-Host "Packing: $projectPath"
          dotnet pack $projectPath --configuration ${{ env.CONFIGURATION }} --no-build --output ./artifacts /p:PackageVersion=$VERSION
        }

    - name: Publish to NuGet.org
      shell: pwsh
      run: |
        $packages = Get-ChildItem ./artifacts/*.nupkg
        foreach ($package in $packages) {
          Write-Host "Publishing: $($package.Name)"
          dotnet nuget push $package.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }

    - name: Create release draft
      if: steps.version.outputs.IS_RELEASE == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        draft: true
        prerelease: false

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Build first so DocFX can read pre-built DLLs instead of .csproj files.
    # Workaround for C# 14 support: https://github.com/dotnet/docfx/issues/10808
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Install DocFX
      run: dotnet tool install -g docfx

    - name: Prepare API landing page
      run: mkdir -p api && mv docs/api/index.md api/index.md

    - name: Build documentation
      run: docfx docfx.json

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
